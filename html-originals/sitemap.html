    .hero{background:var(--dark);padding:48px;text-align:center;position:relative;overflow:hidden}

    .hero-inner{position:relative;z-index:1}
    .eyebrow{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#f87171;margin-bottom:12px}

    @media(max-width:640px){header{padding:0 18px}.nav-links{display:none}.hero{padding:36px 18px}.hero h1{font-size:28px}.main{grid-template-columns:1fr;padding:16px}.smap.span3{grid-column:span 1}.stats-bar{padding:12px 18px;gap:14px}.sum-grid,.pricing-table{grid-template-columns:1fr 1fr}}
  </style>
</head>

<script>
const BADGE = {
  live:      null,
  new:       { label:'new',       bg:'#f0fdf4', color:'#16a34a', border:'#bbf7d0', dot:'#16a34a' },
  updated:   { label:'updated',   bg:'#eff6ff', color:'#2563eb', border:'#bfdbfe', dot:'#2563eb' },
  auth:      { label:'auth',      bg:'#fef3c7', color:'#b45309', border:'#fde68a', dot:'#b45309' },
  deprecate: { label:'deprecate', bg:'#fef2f2', color:'#dc2626', border:'#fecaca', dot:'#9ca3af' },
};

function badge(status) {
  const b = BADGE[status];
  if (!b) return '';
  return `<span class="bdg" style="background:${b.bg};color:${b.color};border:1px solid ${b.border}">${b.label}</span>`;
}

function render() {
  const total      = PAGES.length;
  const newCount   = PAGES.filter(p => p.status === 'new').length;
  const updCount   = PAGES.filter(p => p.status === 'updated').length;
  const depCount   = PAGES.filter(p => p.status === 'deprecate').length;

  document.getElementById('hero-title').textContent = `All ${total} pages on Property Pros`;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-dot" style="background:#111827"></div><strong>${total}</strong>&nbsp;total pages</div>
    <div class="stat"><div class="stat-dot" style="background:#16a34a"></div><strong>${newCount}</strong>&nbsp;new</div>
    <div class="stat"><div class="stat-dot" style="background:#2563eb"></div><strong>${updCount}</strong>&nbsp;updated</div>
    ${depCount ? `<div class="stat"><div class="stat-dot" style="background:#dc2626"></div><strong>${depCount}</strong>&nbsp;to deprecate</div>` : ''}
  `;

  const main = document.getElementById('main');
  main.innerHTML = '';

  // Section cards
  Object.entries(SECTIONS).forEach(([key, sec]) => {
    const pages = PAGES.filter(p => p.section === key);
    if (!pages.length) return;
    const card = document.createElement('div');
    card.className = 'smap';
    card.innerHTML = `
      <div class="smap-head">
        <div class="sh-icon" style="background:${sec.color}"><i data-lucide="${sec.icon}" style="color:${sec.iconColor};width:17px;height:17px"></i></div>
        <div class="sh-title">${sec.label}</div>
        <div class="sh-count">${pages.length}</div>
      </div>
      <div class="smap-body">
        ${pages.map(p => `
          <a href="${p.file}" class="smap-link">
            <i data-lucide="${p.icon}" style="width:13px;height:13px"></i>
            ${p.label}
            ${badge(p.status)}
            <span class="filename">${p.file}</span>
          </a>`).join('')}
      </div>`;
    main.appendChild(card);
  });

  // Summary
  const sum = document.createElement('div');
  sum.className = 'smap span3';
  sum.style.cssText = 'background:var(--dark);border-color:rgba(255,255,255,.08)';
  sum.innerHTML = `
    <div style="padding:24px">
      <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:#6b7280;margin-bottom:16px">Platform summary</div>
      <div class="sum-grid">
        <div class="sum-stat"><div class="sum-num">${total}</div><div class="sum-label">Total pages</div></div>
        <div class="sum-stat"><div class="sum-num" style="color:#f87171">${newCount}</div><div class="sum-label">New this session</div></div>
        <div class="sum-stat"><div class="sum-num" style="color:#60a5fa">${updCount}</div><div class="sum-label">Updated</div></div>
        <div class="sum-stat"><div class="sum-num" style="color:#fcd34d">${Object.keys(SECTIONS).length}</div><div class="sum-label">Sections</div></div>
      </div>
      <div style="font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px;color:#6b7280;margin-bottom:12px">Confirmed pricing</div>
      <div class="pricing-table">
        ${PRICING.map(p => `
          <div class="pt-col">
            <div class="pt-user">${p.user}</div>
            <div class="pt-price" style="color:${p.color}">${p.price}</div>
            <div class="pt-period">${p.period}</div>
            <div class="pt-note">${p.note}</div>
          </div>`).join('')}
      </div>
    </div>`;
  main.appendChild(sum);

  // Change log
  const noted = PAGES.filter(p => p.note);
  if (noted.length) {
    const log = document.createElement('div');
    log.className = 'smap span3';
    log.innerHTML = `
      <div class="smap-head">
        <div class="sh-icon" style="background:var(--bg)"><i data-lucide="git-commit" style="color:var(--gray);width:17px;height:17px"></i></div>
        <div class="sh-title">Changes & notes (${noted.length} pages)</div>
        <span style="font-size:11px;font-weight:700;color:var(--gray);margin-left:auto">May 2026</span>
      </div>
      <div style="padding:12px 16px">
        ${noted.map(p => {
          const b = BADGE[p.status] || BADGE.new;
          return `<div class="cl-row">
            <div class="cl-dot" style="background:${b.dot}"></div>
            <div class="cl-file">${p.file}</div>
            <div class="cl-desc">${p.note}</div>
            <span class="cl-badge" style="background:${b.bg};color:${b.color};border:1px solid ${b.border}">${b.label}</span>
          </div>`;
        }).join('')}
      </div>`;
    main.appendChild(log);
  }

  lucide.createIcons();
}

render();
</script>
</body>
</html>
