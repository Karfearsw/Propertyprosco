<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages · Property Pros</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{
    --dark:#111827; --gray:#6b7280; --border:#e5e7eb; --bg:#f3f4f6; --white:#fff;
    --gold:#b45309; --gold-light:#fef3c7; --brown:#1c1007; --accent:#fcd34d;
    --green:#16a34a; --green-light:#f0fdf4; --blue:#2563eb; --blue-light:#eff6ff; --red:#dc2626;
    --font:'Manrope',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--dark);height:100vh;overflow:hidden}
  a{text-decoration:none;color:inherit}
  .shell{display:flex;height:calc(100vh - 60px)}
  .sidebar{width:224px;background:var(--brown);flex-shrink:0;display:flex;flex-direction:column;padding:14px 12px;overflow-y:auto}
  .side-brand{display:flex;align-items:center;gap:9px;padding:6px 8px 16px}
  .side-brand .logo{width:30px;height:30px;border-radius:8px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff}
  .side-brand .name{font-size:15px;font-weight:900;color:#fff}
  .side-brand .name span{color:var(--accent)}
  .nav-label{font-size:10px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:var(--accent);padding:14px 8px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:9px;font-size:13px;font-weight:700;color:rgba(255,255,255,.65);cursor:pointer;margin-bottom:2px}
  .nav-item i{width:17px;height:17px}
  .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
  .nav-item.active{background:var(--gold);color:#fff}
  header{background:var(--brown);height:60px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
  .h-right{display:flex;align-items:center;gap:6px}
  .h-icon{position:relative;width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#cbb8a8}
  .h-icon .dot{position:absolute;top:7px;right:8px;width:8px;height:8px;background:var(--gold);border-radius:50%;border:2px solid var(--brown)}
  .h-avatar{width:34px;height:34px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
  .hamb{display:none;width:38px;height:38px;border-radius:9px;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;background:transparent;border:none}
  .hamb span{display:block;width:20px;height:2px;background:#cbb8a8;border-radius:2px}

  /* thread list */
  .threads{width:320px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .threads-head{padding:18px 18px 12px;border-bottom:1px solid var(--border)}
  .threads-head h1{font-size:20px;font-weight:900;letter-spacing:-.02em}
  .threads-head p{font-size:12.5px;color:var(--gray);font-weight:600;margin-top:2px}
  .threads-list{flex:1;overflow-y:auto;padding:8px}
  .client-group{margin-bottom:6px}
  .cg-head{display:flex;align-items:center;gap:8px;padding:9px 10px 5px}
  .cg-av{width:24px;height:24px;border-radius:7px;background:var(--gold-light);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
  .cg-name{font-size:13px;font-weight:800}
  .cg-addr{font-size:11px;color:var(--gray);font-weight:600}
  .thread{display:flex;align-items:center;gap:11px;padding:10px 10px 10px 14px;border-radius:11px;cursor:pointer;margin-left:8px}
  .thread:hover{background:var(--bg)}
  .thread.active{background:var(--gold-light)}
  .th-av{width:38px;height:38px;border-radius:10px;background:#7f1d1d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
  .th-av.insp{background:#7c3aed}
  .th-mid{flex:1;min-width:0}
  .th-pro{font-size:13.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .th-job{font-size:11px;color:var(--gold);font-weight:800}
  .th-last{font-size:12px;color:var(--gray);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .th-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .th-time{font-size:10.5px;color:var(--gray);font-weight:700}
  .unread{background:var(--gold);color:#fff;font-size:10px;font-weight:900;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px}

  /* conversation */
  .convo{flex:1;display:flex;flex-direction:column;background:var(--bg);min-width:0}
  .convo-head{background:var(--white);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:12px}
  .back-m{display:none;background:none;border:none;cursor:pointer;color:var(--gray)}
  .ch-av{width:40px;height:40px;border-radius:11px;background:#7f1d1d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0}
  .ch-av.insp{background:#7c3aed}
  .ch-info{flex:1;min-width:0}
  .ch-pro{font-size:15px;font-weight:800}
  .ch-ctx{font-size:12px;color:var(--gray);font-weight:600}
  .ch-ctx b{color:var(--gold)}
  .msgs{flex:1;overflow-y:auto;padding:22px 20px;display:flex;flex-direction:column;gap:12px}
  .day{text-align:center;font-size:11px;color:var(--gray);font-weight:700;margin:4px 0}
  .bubble{max-width:74%;padding:11px 14px;border-radius:15px;font-size:14px;line-height:1.45;font-weight:600}
  .bubble .t{font-size:10px;font-weight:700;margin-top:4px;opacity:.65}
  .b-pro{align-self:flex-start;background:var(--white);border:1px solid var(--border);border-bottom-left-radius:5px}
  .b-me{align-self:flex-end;background:var(--gold);color:#fff;border-bottom-right-radius:5px}
  .composer{background:var(--white);border-top:1px solid var(--border);padding:13px 18px;display:flex;gap:10px;align-items:center}
  .composer input{flex:1;padding:12px 15px;border:1.5px solid var(--border);border-radius:24px;font-size:14px;font-family:var(--font);outline:none}
  .composer input:focus{border-color:var(--gold)}
  .send{width:44px;height:44px;border-radius:50%;background:var(--gold);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .send:hover{background:#92400e}
  .empty-c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--gray);text-align:center;padding:20px}
  .empty-c i{width:40px;height:40px;color:#d1d5db;margin-bottom:12px}

  .drawer{display:none;position:fixed;top:60px;right:0;width:280px;bottom:0;background:var(--brown);border-left:1px solid rgba(255,255,255,.07);z-index:99;flex-direction:column;padding:12px;box-shadow:-8px 0 32px rgba(0,0,0,.3);overflow-y:auto}
  .drawer.on{display:flex}
  .drawer .nav-item{color:rgba(255,255,255,.7)}
  @media(max-width:860px){ .sidebar{display:none} .hamb{display:flex} }
  @media(max-width:620px){
    .threads{width:100%}
    .convo{display:none}
    body.viewing .threads{display:none}
    body.viewing .convo{display:flex}
    .back-m{display:flex}
  }
</style>
</head>
<body>

<header>
  <a href="realtor-dashboard.html" style="display:flex;align-items:center;gap:10px">
    <div style="width:32px;height:32px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff">PP</div>
    <div style="font-size:17px;font-weight:900;color:#fff"><span style="color:var(--accent)">Property</span> Pros</div>
  </a>
  <div class="h-right">
    <a href="realtor-notifications.html" class="h-icon"><i data-lucide="bell"></i><span class="dot"></span></a>
    <div class="h-avatar" onclick="toggleHwMenu()">SR</div>
    <button class="hamb" onclick="toggleHwMenu()"><span></span><span></span><span></span></button>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <div class="side-brand"><div class="logo">PP</div><div class="name"><span>Property</span> Pros</div></div>
    <div class="nav-label">Workspace</div>
    <a href="realtor-dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
    <a href="realtor-clients.html" class="nav-item"><i data-lucide="users"></i> Clients</a>
    <a href="realtor-messages.html" class="nav-item active"><i data-lucide="message-square"></i> Messages</a>
    <a href="realtor-notifications.html" class="nav-item"><i data-lucide="bell"></i> Notifications</a>
    <div class="nav-label">Account</div>
    <a href="realtor-billing.html" class="nav-item"><i data-lucide="credit-card"></i> Plan &amp; Billing</a>
    <a href="realtor-settings.html" class="nav-item"><i data-lucide="settings"></i> Settings</a>
  </aside>

  <div class="threads">
    <div class="threads-head">
      <h1>Messages</h1>
      <p>Your pros, grouped by client.</p>
    </div>
    <div class="threads-list" id="threadsList"></div>
  </div>

  <div class="convo" id="convo">
    <div class="empty-c" id="emptyC">
      <i data-lucide="message-square"></i>
      <div style="font-size:15px;font-weight:800;color:var(--dark)">Select a conversation</div>
      <div style="font-size:13px;margin-top:3px">Pick a pro under one of your clients.</div>
    </div>
  </div>
</div>

<div class="drawer" id="hw-drawer">
  <a href="realtor-dashboard.html" class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
  <a href="realtor-clients.html" class="nav-item"><i data-lucide="users"></i> Clients</a>
  <a href="realtor-messages.html" class="nav-item"><i data-lucide="message-square"></i> Messages</a>
  <a href="realtor-notifications.html" class="nav-item"><i data-lucide="bell"></i> Notifications</a>
  <a href="realtor-billing.html" class="nav-item"><i data-lucide="credit-card"></i> Plan &amp; Billing</a>
  <a href="realtor-settings.html" class="nav-item"><i data-lucide="settings"></i> Settings</a>
</div>

<script>
const DATA = [
  { client:'James Carter', initials:'JC', addr:'24 Maple St, Cranston', pros:[
    { id:'t1', pro:'Apex Roofing Group', initials:'AR', job:'Roof repair', time:'9:03 AM', unread:2,
      msgs:[
        {from:'pro', text:'Hi Sarah — thanks for booking us for the Maple St roof.', time:'9:01 AM'},
        {from:'pro', text:'We can start Friday morning. Does that work for the seller?', time:'9:03 AM'},
      ]},
    { id:'t2', pro:'Coastal Pro Painters', initials:'CP', job:'Interior paint', time:'Yesterday', unread:0,
      msgs:[
        {from:'me', text:'Can you do a neutral greige in the main living areas?', time:'Yesterday 2:10 PM'},
        {from:'pro', text:'Absolutely — sending color samples over now.', time:'Yesterday 2:24 PM'},
      ]},
  ]},
  { client:'Maria Delgado', initials:'MD', addr:'88 Hope Ave, Providence', pros:[
    { id:'t3', pro:'BrightHome Services', initials:'BH', job:'Prep clean', time:'Mon', unread:0,
      msgs:[
        {from:'pro', text:'All done — the home looks great and is photo-ready for listing.', time:'Mon 4:40 PM'},
        {from:'me', text:'Amazing, thank you! I will get the photographer scheduled.', time:'Mon 4:52 PM'},
      ]},
  ]},
  { client:'Daniel Reed', initials:'DR', addr:'5 Cove Rd, Bristol', pros:[
    { id:'t4', pro:'Ocean State Inspections', initials:'OS', job:'Full inspection', time:'Jun 8', unread:1, insp:true,
      msgs:[
        {from:'pro', text:'Inspection report uploaded. 3 items flagged — roof, electrical, plumbing.', time:'Jun 8 11:15 AM'},
      ]},
  ]},
];

let activeId = null;

function renderThreads(){
  const list = document.getElementById('threadsList');
  list.innerHTML = DATA.map(c => `
    <div class="client-group">
      <div class="cg-head">
        <div class="cg-av">${c.initials}</div>
        <div><div class="cg-name">${c.client}</div><div class="cg-addr">${c.addr}</div></div>
      </div>
      ${c.pros.map(p => `
        <div class="thread ${p.id===activeId?'active':''}" onclick="openThread('${p.id}')">
          <div class="th-av ${p.insp?'insp':''}">${p.initials}</div>
          <div class="th-mid">
            <div class="th-pro">${p.pro}</div>
            <div class="th-job">${p.job}</div>
            <div class="th-last">${p.msgs[p.msgs.length-1].text}</div>
          </div>
          <div class="th-right">
            <div class="th-time">${p.time}</div>
            ${p.unread?`<div class="unread">${p.unread}</div>`:''}
          </div>
        </div>`).join('')}
    </div>`).join('');
  lucide.createIcons();
}

function findThread(id){
  for(const c of DATA){ const p=c.pros.find(x=>x.id===id); if(p) return {client:c, pro:p}; }
  return null;
}

function openThread(id){
  activeId = id;
  const t = findThread(id); if(!t) return;
  t.pro.unread = 0;
  document.body.classList.add('viewing');
  const convo = document.getElementById('convo');
  convo.innerHTML = `
    <div class="convo-head">
      <button class="back-m" onclick="closeThread()"><i data-lucide="arrow-left"></i></button>
      <div class="ch-av ${t.pro.insp?'insp':''}">${t.pro.initials}</div>
      <div class="ch-info">
        <div class="ch-pro">${t.pro.pro}</div>
        <div class="ch-ctx"><b>${t.pro.job}</b> · ${t.client.client} · ${t.client.addr}</div>
      </div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="composer">
      <input id="msgInput" placeholder="Message ${t.pro.pro.split(' ')[0]}…" onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="send" onclick="sendMsg()"><i data-lucide="send"></i></button>
    </div>`;
  renderMsgs();
  renderThreads();
  lucide.createIcons();
}

function renderMsgs(){
  const t = findThread(activeId); if(!t) return;
  const box = document.getElementById('msgs');
  box.innerHTML = t.pro.msgs.map(m => `
    <div class="bubble ${m.from==='me'?'b-me':'b-pro'}">${m.text}<div class="t">${m.time}</div></div>`).join('');
  box.scrollTop = box.scrollHeight;
}

function sendMsg(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim(); if(!text) return;
  const t = findThread(activeId);
  t.pro.msgs.push({from:'me', text, time:'Now'});
  inp.value='';
  renderMsgs(); renderThreads();
}

function closeThread(){ document.body.classList.remove('viewing'); }
function toggleHwMenu(){ document.getElementById('hw-drawer').classList.toggle('on'); }
function closeHwMenu(){ document.getElementById('hw-drawer').classList.remove('on'); }

renderThreads();
openThread('t1');
lucide.createIcons();
</script>
</body>
</html>
