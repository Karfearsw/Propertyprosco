name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CI: true
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/property_pros_ci
      AUTH_SECRET: ci-auth-secret
      NEXTAUTH_URL: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Validate production env contract
        run: npm run validate:env:production

      - name: Typecheck
        run: npm run typecheck

      - name: Run focused tests
        run: npm test
